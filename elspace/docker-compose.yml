# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: elspace-postgres
    environment:
      POSTGRES_USER: elspace
      POSTGRES_PASSWORD: elspace_password
      POSTGRES_DB: elspace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - elspace-network

  redis:
    image: redis:7-alpine
    container_name: elspace-redis
    command: redis-server --appendonly yes --requirepass elspace_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - elspace-network

  minio:
    image: minio/minio:latest
    container_name: elspace-minio
    environment:
      MINIO_ROOT_USER: elspace_minio
      MINIO_ROOT_PASSWORD: elspace_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - elspace-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: elspace-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - elspace-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: elspace-app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://elspace:elspace_password@postgres:5432/elspace
      REDIS_URL: redis://default:elspace_redis@redis:6379
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - postgres
      - redis
      - minio
      - mailhog
    networks:
      - elspace-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  elspace-network:
    driver: bridge
